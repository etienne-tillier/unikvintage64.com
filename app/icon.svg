<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7D5C35"/>
      <stop offset="50%" stop-color="#A0784A"/>
      <stop offset="100%" stop-color="#C8974A"/>
    </linearGradient>
  </defs>
  <!-- Fond rectangle arrondi couleur parchemin foncé -->
  <rect width="128" height="128" rx="20" fill="#2E2118"/>
  <!-- cadre doré très fin -->
  <rect x="6" y="6" width="116" height="116" rx="16" fill="none" stroke="url(#goldGrad)" stroke-width="2" opacity="0.6"/>
  <!-- Lettre U stylisée Playfair -->
  <text x="64" y="88" text-anchor="middle" font-family="Georgia, serif" font-weight="700" font-size="72" fill="url(#goldGrad)" letter-spacing="-2">U</text>
  <!-- Petite étoile décorative en bas à droite -->
  <text x="98" y="112" text-anchor="middle" font-size="14" fill="#C8974A" opacity="0.8">✦</text>
</svg>
